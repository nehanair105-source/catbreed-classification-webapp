{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product</title>
  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.16/dist/tailwind.min.css" rel="stylesheet">
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body class="bg-gray-100 font-sans">

  <!-- Container for the Form -->
  <div class="container mx-auto p-8">
    <!-- Form Heading -->
    <h1 class="text-4xl font-semibold text-center text-gray-800 mb-8">
      <i class="fas fa-plus-circle mr-2"></i>Add New Product
    </h1>

    <!-- Display Success Message -->
    {% if messages %}
    <div class="mb-4">
      {% for message in messages %}
      <div class="text-green-600 bg-green-100 p-4 rounded-md mb-2">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <!-- Product Add Form -->
    <form method="POST" enctype="multipart/form-data" class="max-w-lg mx-auto bg-white p-6 rounded-lg shadow-md">
      {% csrf_token %}
      
      <!-- Product Name -->
      <div class="mb-4">
        <label for="productname" class="block text-gray-700 font-medium mb-2">
          Product Name <span class="text-red-500">*</span>
        </label>
        <input type="text" id="productname" name="productname" required class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Enter product name">
      </div>

      <!-- Product Type -->
      <div class="mb-4">
        <label for="type" class="block text-gray-700 font-medium mb-2">
          Product Type <span class="text-red-500">*</span>
        </label>
        <input type="text" id="type" name="type" required class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Enter product type">
      </div>

      <!-- Product Image -->
      <div class="mb-4">
        <label for="product_pic" class="block text-gray-700 font-medium mb-2">
          Product Image <span class="text-red-500">*</span>
        </label>
        <input type="file" id="product_pic" name="product_pic" required class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <!-- Price -->
      <div class="mb-4">
        <label for="price" class="block text-gray-700 font-medium mb-2">
          Price <span class="text-red-500">*</span>
        </label>
        <input type="text" id="price" name="price" required class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Enter product price">
      </div>

      <!-- Description -->
      <div class="mb-4">
        <label for="description" class="block text-gray-700 font-medium mb-2">
          Description
        </label>
        <textarea id="description" name="description" rows="4" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Enter product description"></textarea>
      </div>

      <!-- Submit Button -->
      <div class="text-center">
        <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-semibold rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-50">
          <i class="fas fa-save mr-2"></i> Add Product
        </button>
      </div>
    </form>
  </div>

</body>

</html>
