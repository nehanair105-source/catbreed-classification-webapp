<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescue Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        .chat-box {
            height: 400px;
            overflow-y: scroll;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .chat-message {
            max-width: 80%;
            padding: 12px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            display: inline-block;
            clear: both;
            position: relative;
            flex-shrink: 0;
        }
        .user-message {
            background-color: #0078FF;
            color: white;
            align-self: flex-end; /* Aligns the user message to the right */
            border-top-right-radius: 0;
        }
        .bot-message {
            background-color: #e5e5e5;
            color: #333;
            align-self: flex-start; /* Aligns the bot message to the left */
            border-top-left-radius: 0;
        }
        .chat-box::-webkit-scrollbar {
            width: 8px;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background-color: #ccc;
            border-radius: 4px;
        }
        .chat-box::-webkit-scrollbar-track {
            background-color: #f1f1f1;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 20px;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        button {
            padding: 12px;
            background-color: #0078FF;
            color: white;
            border: none;
            border-radius: 20px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #005bb5;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-box" id="chat-box">
            <!-- Messages will appear here -->
        </div>

        <input type="text" id="user-input" placeholder="Ask your question here...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        function sendMessage() {
            let userInput = document.getElementById("user-input").value;
            let chatBox = document.getElementById("chat-box");

            if (userInput.trim() !== "") {
                // Display user's message
                chatBox.innerHTML += `<div class="chat-message user-message"><strong>You:</strong> ${userInput}</div>`;
                document.getElementById("user-input").value = "";

                // Send AJAX request to get the bot's response
                fetch('/chatbot/get_response/?user_input=' + encodeURIComponent(userInput))
                .then(response => response.json())
                .then(data => {
                    if (data.response) {
                        chatBox.innerHTML += `<div class="chat-message bot-message"><strong>Bot:</strong> ${data.response}</div>`;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    } else {
                        chatBox.innerHTML += `<div class="chat-message bot-message"><strong>Bot:</strong> I didn't understand that. Please ask again.</div>`;
                    }
                })
                .catch(error => {
                    console.log('Error:', error);
                    chatBox.innerHTML += `<div class="chat-message bot-message"><strong>Bot:</strong> Sorry, there was an error processing your request.</div>`;
                });
            }
        }
    </script>

</body>
</html>
