<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback List</title>
    <!-- Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <!-- FontAwesome CDN -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    
    <script>
        // Function to toggle reply form visibility
        function toggleReplyForm(feedbackId) {
            const replyForm = document.getElementById('reply-form-' + feedbackId);
            const isFormVisible = replyForm.style.display === 'block';
            replyForm.style.display = isFormVisible ? 'none' : 'block';
        }
    </script>
</head>
<body class="bg-gray-50 font-sans">

    <!-- Main Content -->
    <div class="max-w-4xl mx-auto p-8 bg-white shadow-xl rounded-xl mt-10">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold text-center text-gray-800">Customer Feedback</h1>
            <!-- Home Button -->
            <a href="/adhome/" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition-all duration-300">
                <i class="fas fa-home mr-2"></i> Home
            </a>
        </div>

        <!-- Feedback List -->
        <div class="space-y-6">
            {% for feedback in feed %}
                <div class="bg-white p-6 rounded-lg shadow-md hover:shadow-lg transition-all duration-300 border-l-4 border-blue-500">
                    <div class="flex justify-between items-center mb-4">
                        <!-- Rating Icon -->
                        <div class="flex items-center space-x-2">
                            <i class="fas fa-star text-yellow-400"></i>
                            <span class="text-lg font-semibold text-gray-900">{{ feedback.rating }}</span>
                        </div>
                        <!-- Date -->
                        <span class="text-sm text-gray-500">{{ feedback.created_at|date:"M d, Y H:i" }}</span>
                    </div>

                    <!-- Feedback Text -->
                    <p class="text-gray-700 mt-2">{{ feedback.feedback_text }}</p>

                    <!-- Posted by Username -->
                    <p class="mt-4 text-sm text-gray-600">Posted by: <span class="font-semibold">{{ feedback.user.name }}</span></p>
                    <p class="mt-4 text-sm text-gray-600"><span class="font-semibold">{{ feedback.user.email }}</span></p>

                    <!-- Action Buttons -->
                    <div class="flex justify-end space-x-4 mt-4">
                        <!-- Reply Button -->
                        <button class="text-blue-500 hover:text-blue-700 font-semibold" onclick="toggleReplyForm({{ feedback.id }})">
                            <i class="fas fa-reply"></i> Reply
                        </button>

                        <!-- Delete Button -->
                        <a href="/deletefeedback/{{ feedback.id }}" class="text-red-500 hover:text-red-700 font-semibold" onclick="return confirm('Are you sure you want to delete this feedback?');">
                            <i class="fas fa-trash-alt"></i> Delete
                        </a>
                    </div>

                    <!-- Reply Form (Initially Hidden) -->
                    <div id="reply-form-{{ feedback.id }}" class="mt-4" style="display: none;">
                        <form action="/feedback_reply/{{ feedback.id }}/" method="POST">
                            {% csrf_token %}
                            <textarea name="reply" rows="4" class="w-full p-2 border border-gray-300 rounded-lg" placeholder="Enter your reply..."></textarea>
                            <button type="submit" class="mt-2 bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
                                Submit Reply
                            </button>
                        </form>
                    </div>
                </div>
            {% empty %}
                <p class="text-gray-500 text-center">No feedback available.</p>
            {% endfor %}
        </div>
    </div>

</body>
</html>
