<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <div class="flex items-center justify-center min-h-screen bg-gray-100">
        <div class="w-full max-w-md bg-white shadow-md rounded-lg p-8 space-y-6">
            <h2 class="text-3xl font-semibold text-center text-gray-700">Seller Registration</h2>
            <form method="POST" action="" class="space-y-6">
                {% csrf_token %}
                <!-- Name -->
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-600">Your Name</label>
                    <div class="mt-1">
                        <input type="text" id="name" name="name" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your full name" required>
                    </div>
                </div>

                <!-- Shop Name -->
                <div>
                    <label for="shopname" class="block text-sm font-medium text-gray-600">Shop Name</label>
                    <div class="mt-1">
                        <input type="text" id="shopname" name="shopname" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your shop name" required>
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-600">Email Address</label>
                    <div class="mt-1 flex items-center border border-gray-300 rounded-md">
                        <span class="px-3 text-gray-500"><i class="fas fa-envelope"></i></span>
                        <input type="email" id="email" name="email" class="w-full p-3 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your email" required>
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-600">Password</label>
                    <div class="mt-1 flex items-center border border-gray-300 rounded-md">
                        <span class="px-3 text-gray-500"><i class="fas fa-lock"></i></span>
                        <input type="password" id="password" name="password" class="w-full p-3 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your password" required>
                    </div>
                </div>

                <!-- Location -->
                <div>
                    <label for="location" class="block text-sm font-medium text-gray-600">Location</label>
                    <div class="mt-1">
                        <input type="text" id="location" name="location" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your shop location" required>
                    </div>
                </div>

                <!-- Phone -->
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-600">Phone Number</label>
                    <div class="mt-1 flex items-center border border-gray-300 rounded-md">
                        <span class="px-3 text-gray-500"><i class="fas fa-phone-alt"></i></span>
                        <input type="tel" id="phone" name="phone" class="w-full p-3 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your phone number" required>
                    </div>
                </div>

                <!-- Register Button -->
                <div>
                    <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-md text-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">Register</button>
                </div>

                <div class="text-center text-sm text-gray-600">
                    <p>Already have an account? <a href="{% url 'sellerlogin' %}" class="text-blue-600 hover:text-blue-700">Login here</a></p>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
