<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.16/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-gray-800 text-white p-4">
            <div class="text-2xl font-semibold mb-8">Admin Panel</div>
            <ul>
                <li class="mb-4">
                    <a href="#" class="flex items-center text-white hover:bg-gray-700 p-2 rounded">
                        <i class="fas fa-tachometer-alt mr-3"></i>
                        Dashboard
                    </a>
                </li>
                <li class="mb-4">
                    <a href="/userlist/" class="flex items-center text-white hover:bg-gray-700 p-2 rounded">
                        <i class="fas fa-users mr-3"></i>
                        Users
                    </a>
                </li>
                <li class="mb-4">
                    <a href="/sellerlist/" class="flex items-center text-white hover:bg-gray-700 p-2 rounded">
                        <i class="fas fa-users mr-3"></i>
                        Sellers
                    </a>
                </li>
                <li class="mb-4">
                    <a href="/feedback_list/" class="flex items-center text-white hover:bg-gray-700 p-2 rounded">
                        <i class="fas fa-users mr-3"></i>
                        Feedback
                    </a>
                </li>
                <li class="mb-4">
                    <a href="#" class="flex items-center text-white hover:bg-gray-700 p-2 rounded">
                        <i class="fas fa-cogs mr-3"></i>
                        Settings
                    </a>
                </li>
                <li class="mb-4">
                    <a href="/adlogout/" class="flex items-center text-white hover:bg-gray-700 p-2 rounded">
                        <i class="fas fa-sign-out-alt mr-3"></i>
                        Logout
                    </a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <!-- Navbar -->
            <div class="bg-white p-4 shadow-md flex justify-between items-center">
                <div class="text-xl font-semibold">Dashboard</div>
                <div class="flex items-center space-x-4">
                    <div class="relative">
                        <input id="searchInput" type="text" class="px-4 py-2 border border-gray-300 rounded-md" placeholder="Search..." onkeyup="searchContent()">
                        <i class="fas fa-search absolute top-2 right-2 text-gray-400"></i>
                    </div>
                    <div class="flex items-center space-x-3">
                        <span class="font-medium">Admin</span>
                        <img src="https://via.placeholder.com/40" alt="Profile" class="w-10 h-10 rounded-full">
                    </div>
                </div>
            </div>

            <!-- Dashboard Content -->
            <div class="p-6 bg-white flex-1">
                <h2 class="text-2xl font-semibold mb-4">Welcome back, Admin!</h2>
                <div class="grid grid-cols-3 gap-6" id="dashboardContent">
                    <!-- Card 1 -->
                    <div class="bg-blue-100 p-4 rounded-lg shadow-lg text-center item" data-name="Users Card">
                        <i class="fas fa-users text-4xl text-blue-600 mb-4"></i>
                        <div class="text-xl font-semibold"><a href="/userlist/">Users</a></div>
                        <div class="text-lg"></div>
                    </div>
                    <!-- Card 2 -->
                    <div class="bg-green-100 p-4 rounded-lg shadow-lg text-center item" data-name="Settings Card">
                        <i class="fa-solid fa-paw text-4xl text-green-600 mb-4"></i>
                        <div class="text-xl font-semibold"><a href="/petlist/">Pets</a></div>
                        <div class="text-lg"></div>
                    </div>
                    <!-- Card 3 -->
                    <div class="bg-yellow-100 p-4 rounded-lg shadow-lg text-center item" data-name="Analytics Card">
                        <i class="fa-brands fa-shopify text-4xl text-yellow-600 mb-4"></i>
                        <div class="text-xl font-semibold"><a href="/productlist/">Products</a></div>
                        <div class="text-lg"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript for search functionality -->
    <script>
        function searchContent() {
            // Get the value of the search input and convert it to lowercase
            let searchQuery = document.getElementById('searchInput').value.toLowerCase();

            // Get all the cards/items that need to be filtered
            let items = document.querySelectorAll('.item');

            // Loop through the items and check if the search term matches the data-name of each item
            items.forEach(function(item) {
                let itemName = item.getAttribute('data-name').toLowerCase();
                if (itemName.includes(searchQuery)) {
                    item.style.display = '';  // Show the item
                } else {
                    item.style.display = 'none';  // Hide the item
                }
            });
        }
    </script>
</body>
</html>
