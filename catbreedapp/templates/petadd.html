<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Pet - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.16/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

    <!-- Main Content -->
    <div class="flex justify-center items-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-xl">
            <h2 class="text-2xl font-semibold text-gray-800 mb-6">Add a New Pet</h2>

            <!-- Success Message -->
            {% if messages %}
            <div class="bg-green-500 text-white p-4 rounded-md mb-4">
                {% for message in messages %}
                <p>{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="catname" class="block text-gray-700 font-medium mb-2">Cat Name</label>
                    <div class="relative">
                        <i class="fas fa-cat absolute left-3 top-3 text-gray-500"></i>
                        <input type="text" name="catname" id="catname" class="w-full p-3 pl-10 border border-gray-300 rounded-md" placeholder="Enter cat's name" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="petname" class="block text-gray-700 font-medium mb-2">Breed Name</label>
                    <div class="relative">
                        <i class="fas fa-paw absolute left-3 top-3 text-gray-500"></i>
                        <input type="text" name="petname" id="petname" class="w-full p-3 pl-10 border border-gray-300 rounded-md" placeholder="Enter breed name" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="price" class="block text-gray-700 font-medium mb-2">Price</label>
                    <div class="relative">
                        <i class="fas fa-paw absolute left-3 top-3 text-gray-500"></i>
                        <input type="number" name="price" id="price" class="w-full p-3 pl-10 border border-gray-300 rounded-md" placeholder="Enter Price" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="cat_pic" class="block text-gray-700 font-medium mb-2">Cat Picture</label>
                    <div class="relative">
                        <i class="fas fa-image absolute left-3 top-3 text-gray-500"></i>
                        <input type="file" name="cat_pic" id="cat_pic" class="w-full p-3 pl-10 border border-gray-300 rounded-md" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="age" class="block text-gray-700 font-medium mb-2">Age (in years)</label>
                    <div class="relative">
                        <i class="fas fa-calendar-alt absolute left-3 top-3 text-gray-500"></i>
                        <input type="number" name="age" id="age" class="w-full p-3 pl-10 border border-gray-300 rounded-md" placeholder="Enter age" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="description" class="block text-gray-700 font-medium mb-2">Description</label>
                    <textarea name="description" id="description" class="w-full p-3 border border-gray-300 rounded-md" rows="4" placeholder="Provide a short description" required></textarea>
                </div>

                <div class="flex items-center justify-between">
                    <button type="submit" class="bg-blue-500 text-white p-3 rounded-md hover:bg-blue-600">
                        <i class="fas fa-save mr-2"></i> Save Pet
                    </button>
                    <a href="{% url 'petlist' %}" class="text-blue-500 hover:text-blue-700">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
